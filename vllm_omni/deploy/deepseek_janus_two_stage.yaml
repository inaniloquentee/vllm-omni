# DeepSeek Janus two-stage: Stage 0 text generation (Llama AR) → Stage 1 JanusPipeline T2I.
#
# Uses ``pipeline: deepseek_janus_two_stage`` (see ``pipeline.py``).
# Stage 0 loads only ``language_model.*`` weights; Stage 1 loads the full HF model
# for image-token VQ decode (duplicate VRAM — reduce tp / run on multi-GPU later).
#
# Example:
#   vllm serve deepseek-ai/Janus-1.3B --omni \
#       --deploy-config vllm_omni/deploy/deepseek_janus_two_stage.yaml

pipeline: deepseek_janus_two_stage
async_chunk: false

stages:
  - stage_id: 0
    max_num_seqs: 1
    devices: "0"
    default_sampling_params:
      temperature: 0.7
      max_tokens: 512
  - stage_id: 1
    max_num_seqs: 1
    devices: "0"
    default_sampling_params:
      seed: 52
