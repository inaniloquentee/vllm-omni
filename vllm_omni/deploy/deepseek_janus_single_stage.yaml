# DeepSeek Janus single-stage deploy: text-to-image via ``JanusPipeline``.
#
# One diffusion stage runs the full HF ``MultiModalityCausalLM`` model including
# the AR image-token loop (576 steps with CFG) and VQ decode.
#
# Optimisations (enforce_eager=False):
#   - torch.compile (mode="reduce-overhead", operator fusion + internal CUDA graphs)
#   - StaticCache (pre-allocated KV cache, O(1) in-place index_copy_)
#   - flash_attn (HF flash_attention_2 backend, auto-detected)
#   - CUDA Graph via vLLM CUDAGraphWrapper (single-token decode capture/replay)
#   - Chunked prefill (long prompts split for OOM prevention)
#
# For online serving with continuous batching and tensor parallelism, use
# deepseek_janus_two_stage.yaml which routes AR generation through vLLM's
# GPU model runner with full PagedAttention, CUDAGraphWrapper, prefix caching,
# FP8 KV cache, and FlashInfer.
#
# Example:
#   vllm serve /root/autodl-tmp/models/Janus-Pro-7B --omni \
#       --deploy-config vllm_omni/deploy/deepseek_janus_single_stage.yaml
#
# Programmatically:
#   Omni(model="...", deploy_config_path="vllm_omni/deploy/deepseek_janus_single_stage.yaml")

pipeline: deepseek_janus_single_stage
async_chunk: false

stages:
  - stage_id: 0
    max_num_seqs: 1
    devices: "0"
    default_sampling_params:
      seed: 52
