steps:
  - label: "🚀 On-Demand Model Perf Test"
    agents:
      queue: "gpu_1_queue"
    plugins:
      - docker#v5.2.0:
          image: public.ecr.aws/q9t5s3a7/vllm-ci-test-repo:$BUILDKITE_COMMIT
          always-pull: true
          propagate-environment: true
          shm-size: "8gb"
          environment:
            - "HF_HOME=/fsx/hf_cache"
            - "HF_TOKEN"
          volumes:
            - "/fsx/hf_cache:/fsx/hf_cache"
    command: |
      echo "--- 🔍 Parsing Trigger Command"
      COMMAND_LINE=$$(echo "$$BUILDKITE_MESSAGE" | grep -m 1 -o '/test-perf.*' || true)
      if [ -z "$$COMMAND_LINE" ]; then
        echo "No /test-perf command found. Exiting gracefully."
        exit 0
      fi
      MODEL_NAME=$$(echo "$$COMMAND_LINE" | awk '{print $$2}')
      SPECIFIC_SCRIPT=$$(echo "$$COMMAND_LINE" | awk '{print $$3}')
      if [ -z "$$MODEL_NAME" ]; then
        echo "❌ Error: No model name provided. Usage: /test-perf <model_name> [script_name]"
        exit 1
      fi
      echo "Extracted model name: $$MODEL_NAME"
      echo "--- 🚀 Executing Performance Test"
      BASE_DIR="benchmarks/$${MODEL_NAME}/vllm_omni"
      if [ ! -d "$$BASE_DIR" ]; then
        echo "❌ Error: Directory $$BASE_DIR not found!"
        exit 1
      fi
      if [ -n "$$SPECIFIC_SCRIPT" ]; then
        SCRIPT_PATH="$$BASE_DIR/$$SPECIFIC_SCRIPT"
      else
        SH_FILES=($$BASE_DIR/*.sh)
        if [ -e "$${SH_FILES[0]}" ]; then
          SCRIPT_PATH="$${SH_FILES[0]}"
          echo "Auto-discovered script: $$SCRIPT_PATH"
        else
          echo "❌ Error: No .sh script found in $$BASE_DIR"
          exit 1
        fi
      fi
      if [ ! -f "$$SCRIPT_PATH" ]; then
        echo "❌ Error: Script $$SCRIPT_PATH not found!"
        exit 1
      fi
      echo "Running $$SCRIPT_PATH ..."
      export VLLM_WORKER_MULTIPROC_METHOD=spawn
      if [[ "$$SCRIPT_PATH" == *.py ]]; then
        timeout 30m python "$$SCRIPT_PATH"
      else
        chmod +x "$$SCRIPT_PATH"
        timeout 30m bash "$$SCRIPT_PATH"
      fi
